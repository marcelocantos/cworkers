name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: cd dashboard && npm ci && npm run build
      - run: go test -race ./...
      - run: go build -o /dev/null .
