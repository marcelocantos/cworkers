name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install cross-compiler
        if: matrix.cc
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc || 'gcc' }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -ldflags "-X main.version=$GITHUB_REF_NAME" -o cworkers .
          tar czf "cworkers-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" cworkers
      - name: Upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" "cworkers-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"

  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: marcelocantos
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          formula_folder: Formula
          install: 'bin.install "cworkers" => "cworkers"'
          version: ${{ github.event.release.tag_name }}
          target_darwin_arm64: true
          target_linux_amd64: true
          target_linux_arm64: true
          test: 'system bin/"cworkers", "--version"'
          formula_includes: |
            service do
              run [opt_bin/"cworkers", "serve"]
              keep_alive true
              log_path var/"log/cworkers.log"
              error_log_path var/"log/cworkers.log"
            end
          skip_checksum: true
          update_readme_table: true
